<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語核心字彙學習工具</title>
<!-- Supabase Auth SDK -->

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div>
    <h1>學測複習工具</h1>
    <div class="subtitle" id="headerSubtitle">英文 ｜ 第三次月考 ｜ L07 / L08 / L09 / R01 / R02 / R03</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <button onclick="openParentModal()" style="background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.6);color:white;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:0.82rem;">👨‍👦 家長查看</button>
  </div>
</header>

<!-- 家長進度 Modal -->
<div id="parentModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;overflow-y:auto;">
  <div style="background:white;max-width:480px;margin:20px auto;border-radius:16px;padding:24px;position:relative;">
    <button onclick="closeParentModal()" style="position:absolute;top:12px;right:12px;background:#e2e8f0;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;">✕</button>
    <h2 style="margin-bottom:4px;font-size:1.2rem;">👨‍👦 家長學習報告</h2>
    <p style="color:#718096;font-size:0.8rem;margin-bottom:20px;" id="parentReportDate"></p>
    <div id="parentModalContent"></div>
  </div>
</div>

<!-- 科目選擇列 -->
<div id="subjectBar" style="display:flex;gap:8px;padding:10px 16px;background:#2a4a7f;border-bottom:1px solid rgba(255,255,255,0.1);overflow-x:auto;-webkit-overflow-scrolling:touch;">
  <button onclick="switchSubject('english', this)" class="subject-btn active-subject" style="flex-shrink:0;padding:7px 18px;border-radius:20px;border:none;font-size:0.9rem;font-weight:700;cursor:pointer;background:white;color:#2b6cb0;">英文</button>
  <button onclick="switchSubject('chinese', this)" class="subject-btn" style="flex-shrink:0;padding:7px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.5);font-size:0.9rem;font-weight:700;cursor:pointer;background:transparent;color:white;">國文</button>
  <button onclick="switchSubject('math', this)" class="subject-btn" style="flex-shrink:0;padding:7px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.5);font-size:0.9rem;font-weight:700;cursor:pointer;background:transparent;color:white;">數學</button>
  <button onclick="switchSubject('social', this)" class="subject-btn" style="flex-shrink:0;padding:7px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.5);font-size:0.9rem;font-weight:700;cursor:pointer;background:transparent;color:white;">社會</button>
  <button onclick="switchSubject('science', this)" class="subject-btn" style="flex-shrink:0;padding:7px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.5);font-size:0.9rem;font-weight:700;cursor:pointer;background:transparent;color:white;">自然</button>
</div>

<!-- 英文科目內容 -->
<div id="subject-english">

<div class="stats-bar" id="globalStats">
  <span>載入中...</span>
</div>

<div class="daily-bar" id="dailyBar">
  <span class="label">📅 今日目標</span>
  <div class="bar-outer"><div class="bar-inner" id="dailyBarInner" style="width:0%"></div></div>
  <span class="count" id="dailyCount">0 / 10</span>
  <button class="daily-study-btn" onclick="startDailyStudy()">開始今日學習</button>
</div>

<nav>
  <button class="active" onclick="switchPage('flashcard', this)">單字卡</button>
  <button onclick="switchPage('quiz', this)">測驗</button>
  <button onclick="switchPage('cloze', this)">📝 克漏字</button>
  <button onclick="switchPage('wencianze', this)">✏️ 文意選填</button>
  <button onclick="switchPage('reading', this)">📖 閱讀理解</button>
  <button onclick="switchPage('progress', this)">進度</button>
</nav>

<div class="filter-bar">
  <span>課次：</span>
  <button class="filter-btn active" onclick="setFilter(0)">全部</button>
  <button class="filter-btn" onclick="setLessonFilter('L07',this)">L07</button>
  <button class="filter-btn" onclick="setLessonFilter('L08',this)">L08</button>
  <button class="filter-btn" onclick="setLessonFilter('L09',this)">L09</button>
  <button class="filter-btn" onclick="setLessonFilter('R01',this)">R01</button>
  <button class="filter-btn" onclick="setLessonFilter('R02',this)">R02</button>
  <button class="filter-btn" onclick="setLessonFilter('R03',this)">R03</button>
  <button class="filter-btn" onclick="setLessonFilter('U09',this)">U09</button>
  <button class="filter-btn" onclick="setLessonFilter('U10',this)">U10</button>
  <button class="filter-btn" onclick="setLessonFilter('U11',this)">U11</button>
  <button class="filter-btn" onclick="setLessonFilter('U12',this)">U12</button>
  <button class="filter-btn" onclick="setFilter(-1)" id="hardOnlyBtn">困難單字</button>
</div>

<!-- 單字卡 -->
<div id="page-flashcard" class="page active">
  <div class="shuffle-bar">
    <button onclick="shuffleCards()">🔀 隨機排序</button>
    <button onclick="resetOrder()">↩ 順序排列</button>
    <button onclick="showHardOnly()">🔴 只看困難</button>
  </div>
  <div class="card-counter" id="cardCounter">0 / 0</div>
  <div class="card-scene" id="cardScene" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="card-actions">
    <button class="btn-prev" onclick="prevCard()">← 上一張</button>
    <button class="btn-mark-hard" onclick="markCard('hard')">🔴 困難</button>
    <button class="btn-mark-known" onclick="markCard('known')">✓ 已學</button>
    <button class="btn-next" onclick="nextCard()">下一張 →</button>
  </div>
</div>

<!-- 測驗 -->
<div id="page-quiz" class="page">
  <div class="quiz-mode-bar">
    <button class="quiz-mode-btn active" id="modeChoiceBtn" onclick="setQuizMode('choice', this)">🔤 選擇題</button>
    <button class="quiz-mode-btn" id="modeSpellingBtn" onclick="setQuizMode('spelling', this)">⌨️ 拼字測驗</button>
  </div>
  <div class="quiz-progress" id="quizProgress"></div>
  <div class="quiz-score" id="quizScore"></div>
  <div class="timer-label" id="timerLabel"></div>
  <div class="timer-wrap" id="timerWrap" style="display:none">
    <div class="timer-bar" id="timerBar"></div>
  </div>
  <div id="quizContent"></div>
</div>

<!-- 克漏字 -->
<div id="page-cloze" class="page">
  <div id="clozeTopBar" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:white;border-bottom:1px solid #e2e8f0;gap:10px;flex-wrap:wrap;">
    <div style="font-size:0.82rem;color:#718096;" id="clozeSessionInfo">點「出題」開始</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="clozeSourceBadge" style="font-size:0.72rem;padding:2px 8px;border-radius:8px;background:#e2e8f0;color:#718096;"></span>
      <button onclick="generateClozeQuestion()" id="clozeBtnGenerate"
        style="padding:8px 18px;background:#3182ce;color:white;border:none;border-radius:8px;font-size:0.88rem;font-weight:700;cursor:pointer;">
        ▶ 出題
      </button>
    </div>
  </div>

  <!-- 出題中 loading -->
  <div id="clozeLoading" style="display:none;text-align:center;padding:48px 16px;">
    <div style="font-size:2rem;margin-bottom:12px;">🤖</div>
    <div style="font-size:1rem;color:#3182ce;font-weight:600;" id="clozeLoadingWord"></div>
    <div style="font-size:0.85rem;color:#a0aec0;margin-top:6px;">正在準備題目，請稍候…</div>
    <div style="margin-top:20px;display:flex;justify-content:center;gap:6px;" id="loadingDots">
      <span style="width:10px;height:10px;background:#3182ce;border-radius:50%;animation:bounce 1s infinite 0s;display:inline-block;"></span>
      <span style="width:10px;height:10px;background:#3182ce;border-radius:50%;animation:bounce 1s infinite 0.2s;display:inline-block;"></span>
      <span style="width:10px;height:10px;background:#3182ce;border-radius:50%;animation:bounce 1s infinite 0.4s;display:inline-block;"></span>
    </div>
  </div>

  <!-- 題目主體 -->
  <div id="clozeMain" style="display:none;padding:16px;max-width:900px;margin:0 auto;">
    <div id="clozeWordHint" style="background:#ebf8ff;border-radius:10px;padding:10px 16px;margin-bottom:14px;font-size:0.85rem;color:#2b6cb0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;"></div>
    <div id="clozeLayout" style="display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start;">
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.07);">
        <div style="font-size:0.72rem;color:#a0aec0;margin-bottom:10px;letter-spacing:1px;">READING PASSAGE</div>
        <p id="clozePassage" style="font-size:1.05rem;line-height:1.9;color:#2d3748;margin-bottom:22px;"></p>
        <hr style="border:none;border-top:1px solid #e2e8f0;margin-bottom:16px;">
        <div id="clozeOptions" style="display:flex;flex-direction:column;gap:10px;"></div>
      </div>
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.07);text-align:center;">
        <div style="font-size:0.72rem;color:#a0aec0;letter-spacing:1px;margin-bottom:6px;">答　題　卡</div>
        <div style="font-size:1rem;font-weight:700;color:#2d3748;margin-bottom:18px;" id="clozeQuestionNo">第 1 題</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;" id="clozeBubbles"></div>
        <div style="font-size:0.75rem;color:#a0aec0;margin-bottom:16px;">按鍵盤 A / B / C / D 快速作答</div>
        <button id="clozeSubmitBtn" onclick="submitCloze()" disabled
          style="width:100%;padding:12px;background:#e2e8f0;color:#a0aec0;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:not-allowed;transition:all 0.2s;">
          交卷
        </button>
        <div id="clozeResultBadge" style="display:none;margin-top:14px;padding:10px;border-radius:10px;font-size:1rem;font-weight:700;"></div>
      </div>
    </div>
    <div id="clozeExplanation" style="display:none;margin-top:16px;background:white;border-radius:14px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.07);">
      <h3 style="font-size:1rem;color:#2d3748;margin-bottom:16px;">📖 詳細解析</h3>
      <div id="clozeExplContent"></div>
      <button onclick="generateClozeQuestion()"
        style="width:100%;margin-top:20px;padding:12px;background:#3182ce;color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;">
        下一題 →
      </button>
    </div>
  </div>

  <div id="clozeError" style="display:none;text-align:center;padding:40px 20px;">
    <div style="font-size:2rem;margin-bottom:10px;">⚠️</div>
    <div style="font-size:0.95rem;color:#e53e3e;font-weight:700;" id="clozeErrorMsg"></div>
  </div>
</div>

<!-- 文意選填 -->
<div id="page-wencianze" class="page">
  <div id="wencianzeContent" style="padding:16px;max-width:700px;margin:0 auto;"></div>
</div>

<!-- 閱讀理解 -->
<div id="page-reading" class="page">
  <div id="readingContent" style="padding:16px;max-width:700px;margin:0 auto;"></div>
</div>

<!-- 進度 -->
<div id="page-progress" class="page">
  <div class="progress-section">
    <div class="progress-card">
      <h3>📊 整體統計</h3>
      <div class="stat-grid" id="statGrid"></div>
    </div>
    <div class="progress-card">
      <h3>✅ 各課次學習進度</h3>
      <div id="levelProgressBars"></div>
    </div>
    <div class="progress-card">
      <h3>🔴 困難單字清單</h3>
      <div class="hard-list" id="hardList"></div>
    </div>
    <div class="progress-card">
      <button class="reset-btn" onclick="confirmReset()">🗑 重設所有進度</button>
    </div>
  </div>
</div>

</div><!-- /subject-english -->

<!-- 國文 -->
<div id="subject-chinese" style="display:none;padding:60px 20px;text-align:center;">
  <div style="font-size:3rem;margin-bottom:16px;">📖</div>
  <h2 style="font-size:1.3rem;color:#2d3748;margin-bottom:8px;">國文</h2>
  <p style="color:#a0aec0;">開發中，敬請期待</p>
</div>

<!-- 數學 -->
<div id="subject-math" style="display:none;">
  <div class="filter-bar">
    <span>分類：</span>
    <button class="filter-btn math-cat-btn active" onclick="setMathCategory('all', this)">全部</button>
    <button class="filter-btn math-cat-btn" onclick="setMathCategory('代數', this)">代數</button>
    <button class="filter-btn math-cat-btn" onclick="setMathCategory('幾何', this)">幾何</button>
    <button class="filter-btn math-cat-btn" onclick="setMathCategory('函數', this)">函數</button>
    <button class="filter-btn math-cat-btn" onclick="setMathCategory('統計', this)">統計</button>
    <button class="filter-btn math-cat-btn" onclick="setMathCategory('三角', this)">三角</button>
  </div>
  <div style="padding:16px;">
    <div class="quiz-progress" id="mathProgress"></div>
    <div class="quiz-score" id="mathScore"></div>
    <div id="mathContent"></div>
  </div>
</div>

<!-- 社會 -->
<div id="subject-social" style="display:none;padding:60px 20px;text-align:center;">
  <div style="font-size:3rem;margin-bottom:16px;">🗺️</div>
  <h2 style="font-size:1.3rem;color:#2d3748;margin-bottom:8px;">社會</h2>
  <p style="color:#a0aec0;">開發中，敬請期待</p>
</div>

<!-- 自然 -->
<div id="subject-science" style="display:none;padding:60px 20px;text-align:center;">
  <div style="font-size:3rem;margin-bottom:16px;">🔬</div>
  <h2 style="font-size:1.3rem;color:#2d3748;margin-bottom:8px;">自然</h2>
  <p style="color:#a0aec0;">開發中，敬請期待</p>
</div>

<script src="vocab-data.js"></script>
<script src="cloze-data.js"></script>
<script src="math-data.js"></script>
<script src="reading-exam3.js"></script>
<script src="cloze-u9.js"></script>
<script src="cloze-u10.js"></script>
<script src="cloze-u11.js"></script>
<script src="cloze-u12.js"></script>
<script src="app.js"></script>
</body>
</html>
