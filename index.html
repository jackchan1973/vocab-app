<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語核心字彙學習工具</title>
<!-- Supabase Auth SDK -->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header .subtitle { font-size: 0.75rem; opacity: 0.85; }

  .stats-bar {
    background: #2c5282;
    color: white;
    padding: 6px 20px;
    font-size: 0.78rem;
    display: flex;
    gap: 20px;
  }
  .stats-bar span { opacity: 0.9; }
  .stats-bar strong { opacity: 1; }

  nav {
    display: flex;
    background: white;
    border-bottom: 2px solid #e2e8f0;
  }
  nav button {
    flex: 1;
    padding: 12px 8px;
    border: none;
    background: none;
    font-size: 0.9rem;
    cursor: pointer;
    color: #718096;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-weight: 500;
  }
  nav button.active {
    color: #3182ce;
    border-bottom-color: #3182ce;
    background: #ebf8ff;
  }
  nav button:hover:not(.active) { background: #f7fafc; }

  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #e2e8f0;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-bar span { font-size: 0.82rem; color: #718096; }
  .filter-btn {
    padding: 5px 12px;
    border: 1.5px solid #cbd5e0;
    border-radius: 20px;
    background: white;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: #3182ce;
    border-color: #3182ce;
    color: white;
  }
  .filter-btn:hover:not(.active) { border-color: #3182ce; color: #3182ce; }

  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ===== 單字卡 ===== */
  .card-counter {
    text-align: center;
    font-size: 0.82rem;
    color: #718096;
    margin-bottom: 12px;
  }

  .card-scene {
    perspective: 1000px;
    max-width: 420px;
    margin: 0 auto 16px;
    height: 220px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    transition: transform 0.5s;
    transform-style: preserve-3d;
    position: relative;
  }
  .card-scene.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    padding: 24px;
    text-align: center;
  }
  .card-front {
    background: white;
  }
  .card-back {
    background: linear-gradient(135deg, #ebf8ff, #bee3f8);
    transform: rotateY(180deg);
  }

  .card-level {
    font-size: 0.72rem;
    background: #3182ce;
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .card-word {
    font-size: 2rem;
    font-weight: 700;
    color: #2d3748;
    margin-bottom: 6px;
  }
  .card-pos {
    font-size: 0.82rem;
    color: #a0aec0;
    font-style: italic;
  }
  .card-hint { font-size: 0.75rem; color: #a0aec0; margin-top: 12px; }

  .card-zh {
    font-size: 1.6rem;
    font-weight: 600;
    color: #2b6cb0;
    margin-bottom: 8px;
  }
  .card-word-back {
    font-size: 0.95rem;
    color: #718096;
    margin-bottom: 6px;
  }

  .speak-btn {
    background: none;
    border: 1.5px solid #3182ce;
    color: #3182ce;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .speak-btn:hover { background: #3182ce; color: white; }

  .card-actions {
    display: flex;
    gap: 10px;
    max-width: 420px;
    margin: 0 auto 12px;
  }
  .card-actions button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 0.88rem;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-prev { background: #e2e8f0; color: #4a5568; }
  .btn-next { background: #3182ce; color: white; }
  .btn-mark-known { background: #48bb78; color: white; }
  .btn-mark-hard { background: #fc8181; color: white; }
  .btn-prev:hover { background: #cbd5e0; }
  .btn-next:hover { background: #2c5282; }
  .btn-mark-known:hover { background: #38a169; }
  .btn-mark-hard:hover { background: #e53e3e; }

  .shuffle-bar {
    max-width: 420px;
    margin: 0 auto 4px;
    display: flex;
    gap: 8px;
  }
  .shuffle-bar button {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1.5px solid #cbd5e0;
    background: white;
    font-size: 0.8rem;
    cursor: pointer;
    color: #4a5568;
    transition: all 0.15s;
  }
  .shuffle-bar button:hover { border-color: #3182ce; color: #3182ce; }

  /* ===== 測驗 ===== */
  .quiz-progress {
    font-size: 0.82rem;
    color: #718096;
    text-align: center;
    margin-bottom: 12px;
  }
  .quiz-score {
    text-align: center;
    font-size: 0.82rem;
    margin-bottom: 12px;
  }
  .quiz-score .correct { color: #38a169; font-weight: 700; }
  .quiz-score .wrong { color: #e53e3e; font-weight: 700; }

  .quiz-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    max-width: 480px;
    margin: 0 auto 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .quiz-type-tag {
    font-size: 0.72rem;
    color: #3182ce;
    background: #ebf8ff;
    padding: 2px 8px;
    border-radius: 8px;
    margin-bottom: 12px;
    display: inline-block;
  }
  .quiz-question {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: #2d3748;
  }
  .quiz-question-pos {
    font-size: 0.8rem;
    color: #a0aec0;
    font-style: italic;
    margin-bottom: 20px;
  }
  .quiz-speak-btn {
    background: none;
    border: 1.5px solid #3182ce;
    color: #3182ce;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.82rem;
    cursor: pointer;
    margin-bottom: 16px;
    transition: all 0.15s;
  }
  .quiz-speak-btn:hover { background: #3182ce; color: white; }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: white;
    text-align: left;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
    color: #2d3748;
  }
  .option-btn:hover:not(:disabled) { border-color: #3182ce; background: #ebf8ff; }
  .option-btn.correct { border-color: #48bb78; background: #f0fff4; color: #276749; }
  .option-btn.wrong { border-color: #fc8181; background: #fff5f5; color: #9b2c2c; }
  .option-btn:disabled { cursor: default; }

  .quiz-next-btn {
    display: block;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 12px;
    background: #3182ce;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .quiz-next-btn:hover { background: #2c5282; }

  .quiz-result {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 480px;
    margin: 0 auto;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .quiz-result h2 { font-size: 1.6rem; margin-bottom: 8px; }
  .quiz-result .big-score {
    font-size: 3rem;
    font-weight: 800;
    color: #3182ce;
    margin: 16px 0;
  }
  .quiz-result p { color: #718096; margin-bottom: 20px; }
  .quiz-restart {
    background: #3182ce;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* ===== 進度 ===== */
  .progress-section {
    max-width: 480px;
    margin: 0 auto;
  }
  .progress-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .progress-card h3 {
    font-size: 1rem;
    margin-bottom: 14px;
    color: #2d3748;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .level-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }
  .level-label {
    font-size: 0.82rem;
    width: 52px;
    color: #4a5568;
    flex-shrink: 0;
  }
  .progress-bar-outer {
    flex: 1;
    height: 10px;
    background: #e2e8f0;
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #3182ce, #63b3ed);
    border-radius: 5px;
    transition: width 0.5s;
  }
  .progress-bar-inner.hard { background: linear-gradient(90deg, #fc8181, #feb2b2); }
  .level-pct {
    font-size: 0.78rem;
    color: #718096;
    width: 38px;
    text-align: right;
    flex-shrink: 0;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat-box {
    background: #f7fafc;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-box .num { font-size: 1.8rem; font-weight: 800; color: #3182ce; }
  .stat-box .num.green { color: #48bb78; }
  .stat-box .num.red { color: #fc8181; }
  .stat-box .num.gray { color: #a0aec0; }
  .stat-box .lbl { font-size: 0.75rem; color: #718096; margin-top: 2px; }

  .reset-btn {
    display: block;
    width: 100%;
    padding: 10px;
    border: 1.5px solid #fc8181;
    border-radius: 10px;
    background: white;
    color: #e53e3e;
    font-size: 0.88rem;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: #fff5f5; }

  .hard-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .hard-word-chip {
    background: #fff5f5;
    border: 1px solid #fed7d7;
    color: #c53030;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .hard-word-chip:hover { background: #fed7d7; }
  .hard-word-chip.known {
    background: #f0fff4;
    border-color: #9ae6b4;
    color: #276749;
  }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: #a0aec0;
    font-size: 0.9rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }

  /* ===== 測驗模式切換 ===== */
  .quiz-mode-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: #f7fafc;
    border-bottom: 1px solid #e2e8f0;
  }
  .quiz-mode-btn {
    flex: 1;
    padding: 8px;
    border: 2px solid #cbd5e0;
    border-radius: 10px;
    background: white;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 500;
    color: #4a5568;
    transition: all 0.15s;
  }
  .quiz-mode-btn.active {
    border-color: #3182ce;
    background: #ebf8ff;
    color: #2b6cb0;
    font-weight: 700;
  }

  /* ===== 計時條 ===== */
  .timer-wrap {
    height: 6px;
    background: #e2e8f0;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 16px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }
  .timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #48bb78, #f6ad55, #fc8181);
    border-radius: 3px;
    transition: width 12s linear;
  }
  .timer-label {
    text-align: center;
    font-size: 0.78rem;
    color: #718096;
    margin-bottom: 8px;
  }

  /* ===== 拼字測驗 ===== */
  .spelling-input {
    width: 100%;
    padding: 14px 16px;
    font-size: 1.2rem;
    border: 2px solid #cbd5e0;
    border-radius: 10px;
    outline: none;
    letter-spacing: 2px;
    font-family: monospace;
    transition: border-color 0.2s;
  }
  .spelling-input:focus { border-color: #3182ce; }
  .spelling-input.correct { border-color: #48bb78; background: #f0fff4; }
  .spelling-input.wrong { border-color: #fc8181; background: #fff5f5; }

  /* ===== 每日目標條 ===== */
  .daily-bar {
    background: linear-gradient(135deg, #f0fff4, #c6f6d5);
    border-bottom: 1px solid #9ae6b4;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.82rem;
  }
  .daily-bar .label { color: #276749; font-weight: 700; white-space: nowrap; }
  .daily-bar .bar-outer {
    flex: 1;
    height: 8px;
    background: #9ae6b4;
    border-radius: 4px;
    overflow: hidden;
  }
  .daily-bar .bar-inner {
    height: 100%;
    background: #38a169;
    border-radius: 4px;
    transition: width 0.4s;
  }
  .daily-bar .count { color: #276749; white-space: nowrap; }
  .daily-study-btn {
    padding: 5px 12px;
    background: #38a169;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .daily-study-btn:hover { background: #276749; }

  /* ===== 熟練度標籤 ===== */
  .mastery-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 700;
    margin-left: 6px;
  }
  .mastery-fast { background: #c6f6d5; color: #276749; }
  .mastery-mid  { background: #fefcbf; color: #744210; }
  .mastery-slow { background: #fed7d7; color: #9b2c2c; }

  /* ===== 響應式設計（手機模式 ≤ 768px）===== */
  @media (max-width: 768px) {
    /* Header：收窄，副標題隱藏 */
    header { padding: 10px 14px; }
    header h1 { font-size: 1rem; }
    header .subtitle { display: none; }

    /* Nav：4 個頁籤字體縮小，確保不換行 */
    nav button { font-size: 0.8rem; padding: 13px 4px; }

    /* 頁面外邊距縮小 */
    .page { padding: 8px; }

    /* 單字卡：動作按鈕換行為 2×2 */
    .card-scene { height: 230px; }
    .card-actions { flex-wrap: wrap; gap: 8px; }
    .card-actions button { flex: 1 1 45%; padding: 13px 8px; font-size: 0.92rem; }

    /* 測驗：觸控區域放大 */
    .quiz-card { padding: 18px 14px; }
    .quiz-question { font-size: 1.15rem; }
    .option-btn { padding: 15px 14px; font-size: 1rem; }
    .option-row { padding: 14px 12px; font-size: 1rem; }
    .quiz-next-btn { padding: 15px; font-size: 1.05rem; }

    /* 拼字測驗輸入框 */
    .spelling-input { font-size: 1.2rem; padding: 14px; }

    /* 克漏字：雙欄 → 單欄（上方題本，下方答題卡）*/
    #clozeLayout {
      grid-template-columns: 1fr !important;
    }

    /* 克漏字氣泡按鈕放大，方便手指點 */
    .bubble { width: 68px; height: 68px; font-size: 1.25rem; }
  }
</style>
</head>
<body>


<header>
  <div>
    <h1>英語核心字彙學習工具</h1>
    <div class="subtitle">LIVE ABC 核心字彙 ｜ 2-4 級 ｜ 大考中心詞彙表</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <button onclick="openParentModal()" style="background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.6);color:white;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:0.82rem;">👨‍👦 家長查看</button>
  </div>
</header>

<!-- 家長進度 Modal -->
<div id="parentModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;overflow-y:auto;">
  <div style="background:white;max-width:480px;margin:20px auto;border-radius:16px;padding:24px;position:relative;">
    <button onclick="closeParentModal()" style="position:absolute;top:12px;right:12px;background:#e2e8f0;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;">✕</button>
    <h2 style="margin-bottom:4px;font-size:1.2rem;">👨‍👦 家長學習報告</h2>
    <p style="color:#718096;font-size:0.8rem;margin-bottom:20px;" id="parentReportDate"></p>
    <div id="parentModalContent"></div>
  </div>
</div>

<div class="stats-bar" id="globalStats">
  <span>載入中...</span>
</div>

<div class="daily-bar" id="dailyBar">
  <span class="label">📅 今日目標</span>
  <div class="bar-outer"><div class="bar-inner" id="dailyBarInner" style="width:0%"></div></div>
  <span class="count" id="dailyCount">0 / 10</span>
  <button class="daily-study-btn" onclick="startDailyStudy()">開始今日學習</button>
</div>

<nav>
  <button class="active" onclick="switchPage('flashcard', this)">單字卡</button>
  <button onclick="switchPage('quiz', this)">測驗</button>
  <button onclick="switchPage('cloze', this)">📝 克漏字</button>
  <button onclick="switchPage('progress', this)">進度</button>
</nav>

<div class="filter-bar">
  <span>級別篩選：</span>
  <button class="filter-btn active" onclick="setFilter(0)">全部</button>
  <button class="filter-btn" onclick="setFilter(2)">Level 2</button>
  <button class="filter-btn" onclick="setFilter(3)">Level 3</button>
  <button class="filter-btn" onclick="setFilter(4)">Level 4</button>
  <button class="filter-btn" onclick="setFilter(-1)" id="hardOnlyBtn">困難單字</button>
</div>

<!-- 單字卡 -->
<div id="page-flashcard" class="page active">
  <div class="shuffle-bar">
    <button onclick="shuffleCards()">🔀 隨機排序</button>
    <button onclick="resetOrder()">↩ 順序排列</button>
    <button onclick="showHardOnly()">🔴 只看困難</button>
  </div>
  <div class="card-counter" id="cardCounter">0 / 0</div>
  <div class="card-scene" id="cardScene" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="card-actions">
    <button class="btn-prev" onclick="prevCard()">← 上一張</button>
    <button class="btn-mark-hard" onclick="markCard('hard')">🔴 困難</button>
    <button class="btn-mark-known" onclick="markCard('known')">✓ 已學</button>
    <button class="btn-next" onclick="nextCard()">下一張 →</button>
  </div>
</div>

<!-- 測驗 -->
<div id="page-quiz" class="page">
  <div class="quiz-mode-bar">
    <button class="quiz-mode-btn active" id="modeChoiceBtn" onclick="setQuizMode('choice', this)">🔤 選擇題</button>
    <button class="quiz-mode-btn" id="modeSpellingBtn" onclick="setQuizMode('spelling', this)">⌨️ 拼字測驗</button>
  </div>
  <div class="quiz-progress" id="quizProgress"></div>
  <div class="quiz-score" id="quizScore"></div>
  <div class="timer-label" id="timerLabel"></div>
  <div class="timer-wrap" id="timerWrap" style="display:none">
    <div class="timer-bar" id="timerBar"></div>
  </div>
  <div id="quizContent"></div>
</div>

<!-- 克漏字 -->
<div id="page-cloze" class="page">
  <div id="clozeTopBar" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:white;border-bottom:1px solid #e2e8f0;gap:10px;flex-wrap:wrap;">
    <div style="font-size:0.82rem;color:#718096;" id="clozeSessionInfo">點「出題」開始</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="clozeSourceBadge" style="font-size:0.72rem;padding:2px 8px;border-radius:8px;background:#e2e8f0;color:#718096;"></span>
      <button onclick="generateClozeQuestion()" id="clozeBtnGenerate"
        style="padding:8px 18px;background:#3182ce;color:white;border:none;border-radius:8px;font-size:0.88rem;font-weight:700;cursor:pointer;">
        ▶ 出題
      </button>
    </div>
  </div>

  <!-- 出題中 loading -->
  <div id="clozeLoading" style="display:none;text-align:center;padding:48px 16px;">
    <div style="font-size:2rem;margin-bottom:12px;">🤖</div>
    <div style="font-size:1rem;color:#3182ce;font-weight:600;" id="clozeLoadingWord"></div>
    <div style="font-size:0.85rem;color:#a0aec0;margin-top:6px;">AI 正在出題中，請稍候…</div>
    <div style="margin-top:20px;display:flex;justify-content:center;gap:6px;" id="loadingDots">
      <span style="width:10px;height:10px;background:#3182ce;border-radius:50%;animation:bounce 1s infinite 0s;display:inline-block;"></span>
      <span style="width:10px;height:10px;background:#3182ce;border-radius:50%;animation:bounce 1s infinite 0.2s;display:inline-block;"></span>
      <span style="width:10px;height:10px;background:#3182ce;border-radius:50%;animation:bounce 1s infinite 0.4s;display:inline-block;"></span>
    </div>
  </div>

  <!-- 題目主體 -->
  <div id="clozeMain" style="display:none;padding:16px;max-width:900px;margin:0 auto;">
    <!-- 上方：單字提示 -->
    <div id="clozeWordHint" style="background:#ebf8ff;border-radius:10px;padding:10px 16px;margin-bottom:14px;font-size:0.85rem;color:#2b6cb0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    </div>

    <!-- 左右雙欄 -->
    <div id="clozeLayout" style="display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start;">

      <!-- 左欄：題本 -->
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.07);">
        <div style="font-size:0.72rem;color:#a0aec0;margin-bottom:10px;letter-spacing:1px;">READING PASSAGE</div>
        <p id="clozePassage" style="font-size:1.05rem;line-height:1.9;color:#2d3748;margin-bottom:22px;"></p>
        <hr style="border:none;border-top:1px solid #e2e8f0;margin-bottom:16px;">
        <div id="clozeOptions" style="display:flex;flex-direction:column;gap:10px;"></div>
      </div>

      <!-- 右欄：答題卡 -->
      <div style="background:white;border-radius:14px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.07);text-align:center;">
        <div style="font-size:0.72rem;color:#a0aec0;letter-spacing:1px;margin-bottom:6px;">答　題　卡</div>
        <div style="font-size:1rem;font-weight:700;color:#2d3748;margin-bottom:18px;" id="clozeQuestionNo">第 1 題</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;" id="clozeBubbles">
          <!-- bubbles injected by JS -->
        </div>
        <div style="font-size:0.75rem;color:#a0aec0;margin-bottom:16px;">按鍵盤 A / B / C / D 快速作答</div>
        <button id="clozeSubmitBtn" onclick="submitCloze()" disabled
          style="width:100%;padding:12px;background:#e2e8f0;color:#a0aec0;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:not-allowed;transition:all 0.2s;">
          交卷
        </button>
        <div id="clozeResultBadge" style="display:none;margin-top:14px;padding:10px;border-radius:10px;font-size:1rem;font-weight:700;"></div>
      </div>
    </div>

    <!-- 解析展開 -->
    <div id="clozeExplanation" style="display:none;margin-top:16px;background:white;border-radius:14px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.07);">
      <h3 style="font-size:1rem;color:#2d3748;margin-bottom:16px;">📖 詳細解析</h3>
      <div id="clozeExplContent"></div>
      <button onclick="generateClozeQuestion()"
        style="width:100%;margin-top:20px;padding:12px;background:#3182ce;color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;">
        下一題 →
      </button>
    </div>
  </div>

  <!-- 錯誤訊息 -->
  <div id="clozeError" style="display:none;text-align:center;padding:40px 20px;">
    <div style="font-size:2rem;margin-bottom:10px;">⚠️</div>
    <div style="font-size:0.95rem;color:#e53e3e;font-weight:700;" id="clozeErrorMsg"></div>
    <button onclick="openApiKeyModal()" style="margin-top:16px;padding:8px 20px;background:#3182ce;color:white;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;">
      設定 API Key
    </button>
  </div>
</div>


<style>
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.bubble {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 3px solid #cbd5e0;
  background: white;
  font-size: 1.1rem;
  font-weight: 800;
  color: #4a5568;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto;
}
.bubble:hover { border-color: #3182ce; color: #3182ce; background:#ebf8ff; }
.bubble.selected { background: #2b6cb0; border-color: #2b6cb0; color: white; }
.bubble.correct-bubble { background: #38a169; border-color: #38a169; color: white; }
.bubble.wrong-bubble { background: #e53e3e; border-color: #e53e3e; color: white; }
.option-row {
  padding: 11px 14px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  font-size: 0.95rem;
  color: #2d3748;
  cursor: default;
}
.option-row.highlight-correct { border-color: #48bb78; background: #f0fff4; }
.option-row.highlight-wrong { border-color: #fc8181; background: #fff5f5; }
</style>

  </div>
</div>

let currentFilter = 0;
let currentDeck = [];
let currentCardIndex = 0;
let isFlipped = false;

// 進度存在 localStorage
const STORAGE_KEY = 'vocab_progress';
const LOG_KEY = 'vocab_log';

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch(e) { return {}; }
}

function saveProgress(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// 學習日誌：記錄每次標記動作
function logActivity(word, action) {
  try {
    const log = JSON.parse(localStorage.getItem(LOG_KEY)) || [];
    log.push({ word, action, time: Date.now() });
    // 只保留最近 500 筆
    if (log.length > 500) log.splice(0, log.length - 500);
    localStorage.setItem(LOG_KEY, JSON.stringify(log));
  } catch(e) {}
}

function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY)) || []; } catch(e) { return []; }
}

// 儲存測驗成績
const QUIZ_KEY = 'vocab_quiz_scores';
function saveQuizScore(correct, total) {
  try {
    const scores = JSON.parse(localStorage.getItem(QUIZ_KEY)) || [];
    scores.push({ correct, total, time: Date.now() });
    if (scores.length > 30) scores.splice(0, scores.length - 30);
    localStorage.setItem(QUIZ_KEY, JSON.stringify(scores));
  } catch(e) {}
}
function loadQuizScores() {
  try { return JSON.parse(localStorage.getItem(QUIZ_KEY)) || []; } catch(e) { return []; }
}

function getWordStatus(word) {
  const p = loadProgress();
  return p[word] || 'new'; // 'new' | 'known' | 'hard'
}

function setWordStatus(word, status) {
  const p = loadProgress();
  if (status === 'new') {
    delete p[word];
  } else {
    p[word] = status;
  }
  saveProgress(p);
  logActivity(word, status);
}

// ===== 篩選 =====
function getFilteredDeck() {
  const p = loadProgress();
  if (currentFilter === -1) {
    return VOCAB_ALL.filter(v => p[v.word] === 'hard');
  }
  if (currentFilter === 0) return [...VOCAB_ALL];
  return VOCAB_ALL.filter(v => v.level === currentFilter);
}

function setFilter(level) {
  currentFilter = level;
  document.querySelectorAll('.filter-btn').forEach((b, i) => {
    const vals = [0, 2, 3, 4, -1];
    b.classList.toggle('active', vals[i] === level);
  });
  currentDeck = getFilteredDeck();
  currentCardIndex = 0;
  isFlipped = false;
  renderCard();
  updateGlobalStats();

  // 如果在測驗頁就重新開始
  if (document.getElementById('page-quiz').classList.contains('active')) {
    startQuiz();
  }
  if (document.getElementById('page-progress').classList.contains('active')) {
    renderProgress();
  }
}

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  if (page === 'progress') renderProgress();
}

// ===== 發音（優先真人錄音，備援 TTS）=====
const audioCache = {};

async function speak(word) {
  const clean = word.split('/')[0].split('(')[0].replace(/[^a-zA-Z\s'-]/g, '').trim();
  const key = clean.toLowerCase();
  if (!key) return;

  if (audioCache[key] !== undefined) {
    audioCache[key] ? playAudioUrl(audioCache[key]) : speakTTS(clean);
    return;
  }

  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(key)}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    let url = '';
    // 優先找美式錄音
    for (const e of data) {
      for (const ph of (e.phonetics || [])) {
        if (ph.audio && ph.audio.includes('-us')) { url = ph.audio; break; }
      }
      if (url) break;
    }
    // 找任何錄音
    if (!url) {
      for (const e of data) {
        for (const ph of (e.phonetics || [])) {
          if (ph.audio) { url = ph.audio; break; }
        }
        if (url) break;
      }
    }
    audioCache[key] = url || null;
    url ? playAudioUrl(url) : speakTTS(clean);
  } catch(e) {
    audioCache[key] = null;
    speakTTS(clean);
  }
}

function playAudioUrl(url) {
  const a = new Audio(url);
  a.play().catch(() => speakTTS(url));
}

function speakTTS(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US' && /samantha|zira|david/i.test(v.name))
                || voices.find(v => v.lang === 'en-US');
  if (usVoice) u.voice = usVoice;
  window.speechSynthesis.speak(u);
}

function renderCard() {
  const scene = document.getElementById('cardScene');
  const front = document.getElementById('cardFront');
  const back = document.getElementById('cardBack');
  const counter = document.getElementById('cardCounter');

  if (currentDeck.length === 0) {
    counter.textContent = '此分類沒有單字';
    front.innerHTML = '<div class="empty-state"><div class="icon">📭</div>此分類目前沒有單字</div>';
    back.innerHTML = '';
    scene.classList.remove('flipped');
    return;
  }

  const v = currentDeck[currentCardIndex];
  const status = getWordStatus(v.word);
  const statusTag = status === 'known'
    ? '<span style="background:#48bb78;color:white;border-radius:8px;padding:2px 8px;font-size:0.7rem;margin-left:6px;">已學</span>'
    : status === 'hard'
    ? '<span style="background:#fc8181;color:white;border-radius:8px;padding:2px 8px;font-size:0.7rem;margin-left:6px;">困難</span>'
    : '';

  counter.textContent = `${currentCardIndex + 1} / ${currentDeck.length}`;

  front.innerHTML = `
    <div class="card-level">Level ${v.level}</div>
    <div class="card-word">${v.word}${statusTag}</div>
    <div class="card-pos">${v.pos}</div>
    <button class="speak-btn" onclick="event.stopPropagation();speak('${v.word.replace(/'/g,"\\'")}')">🔊</button>
    <div class="card-hint">點擊翻面查看中文</div>
  `;

  back.innerHTML = `
    <div class="card-level">Level ${v.level}</div>
    <div class="card-word-back">${v.word} <span style="color:#a0aec0;font-style:italic">(${v.pos})</span></div>
    <div class="card-zh">${v.zh}</div>
    <button class="speak-btn" onclick="event.stopPropagation();speak('${v.word.replace(/'/g,"\\'")}')">🔊</button>
  `;

  if (isFlipped) {
    scene.classList.add('flipped');
  } else {
    scene.classList.remove('flipped');
  }

  // 記錄今日已看過這個字
  markWordSeen(v.word);
}

function flipCard() {
  if (currentDeck.length === 0) return;
  isFlipped = !isFlipped;
  document.getElementById('cardScene').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (currentDeck.length === 0) return;
  isFlipped = false;
  currentCardIndex = (currentCardIndex + 1) % currentDeck.length;
  renderCard();
}

function prevCard() {
  if (currentDeck.length === 0) return;
  isFlipped = false;
  currentCardIndex = (currentCardIndex - 1 + currentDeck.length) % currentDeck.length;
  renderCard();
}

function markCard(status) {
  if (currentDeck.length === 0) return;
  const v = currentDeck[currentCardIndex];
  const current = getWordStatus(v.word);
  // 再次點同樣的標籤 → 取消
  setWordStatus(v.word, current === status ? 'new' : status);
  renderCard();
  updateGlobalStats();
}

function shuffleCards() {
  for (let i = currentDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
  }
  currentCardIndex = 0;
  isFlipped = false;
  renderCard();
}

function resetOrder() {
  currentDeck = getFilteredDeck();
  currentCardIndex = 0;
  isFlipped = false;
  renderCard();
}

function showHardOnly() {
  setFilter(-1);
}

// ===== 測驗 =====
let quizQuestions = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizWrong = 0;
let quizAnswered = false;

function startQuiz() {
  clearQuizTimer();
  const deck = getFilteredDeck();
  const minNeeded = quizMode === 'choice' ? 4 : 1;
  if (deck.length < minNeeded) {
    document.getElementById('quizContent').innerHTML = '<div class="empty-state"><div class="icon">📭</div>此分類單字不足，請切換其他篩選</div>';
    document.getElementById('quizProgress').textContent = '';
    document.getElementById('quizScore').textContent = '';
    return;
  }
  const shuffled = [...deck].sort(() => Math.random() - 0.5);
  quizQuestions = shuffled.slice(0, Math.min(20, deck.length));
  quizIndex = 0;
  quizCorrect = 0;
  quizWrong = 0;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  document.getElementById('quizProgress').textContent = `第 ${quizIndex + 1} 題 / 共 ${quizQuestions.length} 題`;
  document.getElementById('quizScore').innerHTML = `正確：<span class="correct">${quizCorrect}</span>　錯誤：<span class="wrong">${quizWrong}</span>`;
  if (quizMode === 'spelling') { renderSpellingQuestion(); return; }

  quizAnswered = false;
  const q = quizQuestions[quizIndex];
  const allOthers = VOCAB_ALL.filter(v => v.word !== q.word);
  const wrongs = allOthers.sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [q, ...wrongs].sort(() => Math.random() - 0.5);

  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-type-tag">選出正確的中文翻譯</div>
      <div class="quiz-question">${q.word}</div>
      <div class="quiz-question-pos">(${q.pos})</div>
      <button class="quiz-speak-btn" onclick="speak('${q.word.replace(/'/g,"\\'")}')">🔊 聽發音</button>
      <div class="options">
        ${options.map((o, i) => `
          <button class="option-btn" onclick="answerQuiz(this, '${o.zh.replace(/'/g,"\\'")}', '${q.zh.replace(/'/g,"\\'")}')">
            ${String.fromCharCode(65+i)}. ${o.zh}
          </button>
        `).join('')}
      </div>
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" style="display:none" onclick="nextQuizQuestion()">
      ${quizIndex + 1 < quizQuestions.length ? '下一題 →' : '查看結果'}
    </button>
  `;
  startQuizTimer();
}

function answerQuiz(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const t = getResponseTime();
  clearQuizTimer();

  const q = quizQuestions[quizIndex];
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim().substring(3) === correct) b.classList.add('correct');
  });

  if (chosen === correct) {
    btn.classList.add('correct');
    quizCorrect++;
    setWordStatus(q.word, 'known');
    recordDailyResult(q.word, true, t);
    // 在正確按鈕上顯示熟練度
    btn.insertAdjacentHTML('beforeend', ' ' + getMasteryTag(t));
  } else {
    btn.classList.add('wrong');
    quizWrong++;
    setWordStatus(q.word, 'hard');
    recordDailyResult(q.word, false, t);
  }

  document.getElementById('quizScore').innerHTML = `正確：<span class="correct">${quizCorrect}</span>　錯誤：<span class="wrong">${quizWrong}</span>`;
  document.getElementById('quizNextBtn').style.display = 'block';
  updateGlobalStats();
}

function nextQuizQuestion() {
  quizIndex++;
  if (quizIndex >= quizQuestions.length) {
    showQuizResult();
  } else {
    renderQuizQuestion();
  }
}

function showQuizResult() {
  const total = quizQuestions.length;
  const pct = Math.round(quizCorrect / total * 100);
  saveQuizScore(quizCorrect, total);
  let emoji = pct >= 90 ? '🎉' : pct >= 70 ? '👍' : pct >= 50 ? '💪' : '📚';
  document.getElementById('quizProgress').textContent = '';
  document.getElementById('quizScore').textContent = '';
  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-result">
      <h2>${emoji} 測驗完成！</h2>
      <div class="big-score">${pct}%</div>
      <p>答對 ${quizCorrect} 題，答錯 ${quizWrong} 題，共 ${total} 題</p>
      <button class="quiz-restart" onclick="startQuiz()">再測一次</button>
    </div>
  `;
}

      </div>
    `;
  });
  document.getElementById('levelProgressBars').innerHTML = barsHTML;

  // 困難單字清單
  const hardWords = Object.entries(p)
    .filter(([w, s]) => s === 'hard')
    .map(([w]) => w);

  if (hardWords.length === 0) {
    document.getElementById('hardList').innerHTML = '<div class="empty-state">目前沒有困難單字</div>';
  } else {
    document.getElementById('hardList').innerHTML = hardWords.map(w => `
      <span class="hard-word-chip" onclick="markKnownFromProgress('${w.replace(/'/g,"\\'")}', this)" title="點擊標為已學">
        ${w}
      </span>
    `).join('');
  }
}

function markKnownFromProgress(word, el) {
  setWordStatus(word, 'known');
  el.classList.add('known');
  el.title = '已標為已學';
  updateGlobalStats();
  setTimeout(() => renderProgress(), 800);
}

function confirmReset() {
  if (confirm('確定要重設所有學習進度嗎？此操作無法復原。')) {
    localStorage.removeItem(STORAGE_KEY);
    renderProgress();
    updateGlobalStats();
    renderCard();
  }
}

// ===== 全域統計列 =====
function updateGlobalStats() {
  const p = loadProgress();
  const total = currentDeck.length;
  const known = currentDeck.filter(v => p[v.word] === 'known').length;
  const hard = currentDeck.filter(v => p[v.word] === 'hard').length;
  const pct = total > 0 ? Math.round(known / total * 100) : 0;
  document.getElementById('globalStats').innerHTML = `
    <span>目前範圍：<strong>${total} 字</strong></span>
    <span>已學：<strong>${known}</strong></span>
    <span>困難：<strong>${hard}</strong></span>
    <span>完成度：<strong>${pct}%</strong></span>
  `;
}

let clozeBankIndex = 0;

function pickTargetWord() {
  const p = loadProgress();
  const hardWords = VOCAB_ALL.filter(v => p[v.word] === 'hard');
  const pool = hardWords.length > 0 && Math.random() < 0.4 ? hardWords : VOCAB_ALL;
  return pool[Math.floor(Math.random() * pool.length)];
}

async function tryOllama(target) {
  const prompt = `You are a Taiwan high school English teacher. Generate ONE cloze test question for the word: ${target.word} (${target.pos}, Chinese: ${target.zh})\n\nReturn ONLY valid JSON (no markdown):\n{"passage":"40-60 word English passage with [BLANK] where ${target.word} goes","options":{"A":"option","B":"option","C":"option","D":"option"},"correct_answer":"letter A/B/C/D","explanation":{"chinese_translation":"中文翻譯","core_concept":"核心觀念","why_correct":"為何正確","why_others_wrong":"其他選項分析"}}`;

  const res = await fetch('http://localhost:11434/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'gemma4:latest',
      prompt,
      stream: false,
      options: { temperature: 0.7, num_predict: 2000 }
    })
  });
  if (!res.ok) throw new Error('Ollama 無回應');
  const data = await res.json();
  const raw = data.response || '';
  const m = raw.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('格式錯誤');
  const q = JSON.parse(m[0]);
  if (!q.passage?.includes('[BLANK]')) throw new Error('缺少 [BLANK]');
  if (!['A','B','C','D'].includes(q.correct_answer)) throw new Error('答案格式錯誤');
  return q;
}

function getBankQuestion(target) {
  if (CLOZE_BANK.length === 0) return null;
  // 先找對應單字
  const match = CLOZE_BANK.find(q => q.word === target.word);
  if (match) return match;
  // 找相同 level
  const levelMatch = CLOZE_BANK.filter(q => q.level === target.level);
  if (levelMatch.length > 0) return levelMatch[Math.floor(Math.random() * levelMatch.length)];
  // 隨機
  return CLOZE_BANK[clozeBankIndex++ % CLOZE_BANK.length];
}

async function generateClozeQuestion() {
  const target = pickTargetWord();

  document.getElementById('clozeMain').style.display = 'none';
  document.getElementById('clozeError').style.display = 'none';
  document.getElementById('clozeLoading').style.display = 'block';
  document.getElementById('clozeLoadingWord').textContent = `正在出題中…`;
  document.getElementById('clozeBtnGenerate').disabled = true;

  try {
    // 優先嘗試本地 Ollama（Jack 的 Mac 上可用）
    let q, source;
    try {
      document.getElementById('clozeLoadingWord').textContent = `🤖 Ollama 出題中…`;
      q = await tryOllama(target);
      source = '🤖 Ollama 即時出題';
    } catch(ollamaErr) {
      // Ollama 不可用 → 用預存題庫
      q = getBankQuestion(target);
      if (!q) throw new Error('題庫尚未載入，請稍後再試（題庫產生中…）');
      source = '📚 題庫';
      // 用題庫的 target 覆蓋
      target.word = q.word;
      target.pos = q.pos;
      target.zh = q.zh;
      target.level = q.level;
    }

    const badge = document.getElementById('clozeSourceBadge');
    if (badge) badge.textContent = source;
    renderClozeQuestion(q, target);
  } catch(e) {
    document.getElementById('clozeLoading').style.display = 'none';
    document.getElementById('clozeError').style.display = 'block';
    document.getElementById('clozeErrorMsg').textContent = e.message || '出題失敗，請重試';
  } finally {
    document.getElementById('clozeBtnGenerate').disabled = false;
  }
}

function renderClozeQuestion(q, target) {
  clozeCurrentAnswer = '';
  clozeCorrectAnswer = q.correct_answer;
  clozeCurrentTarget = target;
  clozeSubmitted = false;
  clozeSessionCount++;

  document.getElementById('clozeLoading').style.display = 'none';
  document.getElementById('clozeExplanation').style.display = 'none';
  document.getElementById('clozeResultBadge').style.display = 'none';
  document.getElementById('clozeMain').style.display = 'block';
  document.getElementById('clozeSessionInfo').textContent =
    `本次：${clozeSessionCount} 題 ｜ 答對 ${clozeCorrectCount} 題`;

  // 單字提示（交卷前隱藏，交卷後才顯示）
  document.getElementById('clozeWordHint').innerHTML = '';

  // 段落（高亮 [BLANK]）
  document.getElementById('clozePassage').innerHTML =
    q.passage.replace('[BLANK]',
      '<span style="display:inline-block;background:#bee3f8;border-bottom:2px solid #3182ce;padding:0 8px;border-radius:4px;font-weight:700;color:#2b6cb0;min-width:80px;text-align:center;">&nbsp;&nbsp;&nbsp;?&nbsp;&nbsp;&nbsp;</span>');

  // 選項列表
  const letters = ['A','B','C','D'];
  document.getElementById('clozeOptions').innerHTML = letters.map(l =>
    `<div class="option-row" id="optRow${l}">
       <strong>${l}.</strong>&nbsp;&nbsp;${q.options[l]}
     </div>`
  ).join('');

  // 答題卡氣泡
  document.getElementById('clozeQuestionNo').textContent = `第 ${clozeSessionCount} 題`;
  document.getElementById('clozeBubbles').innerHTML = letters.map(l =>
    `<div>
       <div class="bubble" id="bubble${l}" onclick="selectBubble('${l}')">${l}</div>
     </div>`
  ).join('');

  // 重置交卷鍵
  const btn = document.getElementById('clozeSubmitBtn');
  btn.disabled = true;
  btn.style.background = '#e2e8f0';
  btn.style.color = '#a0aec0';
  btn.style.cursor = 'not-allowed';
}

function selectBubble(letter) {
  if (clozeSubmitted) return;
  clozeCurrentAnswer = letter;
  ['A','B','C','D'].forEach(l => {
    document.getElementById('bubble' + l).classList.toggle('selected', l === letter);
  });
  const btn = document.getElementById('clozeSubmitBtn');
  btn.disabled = false;
  btn.style.background = '#3182ce';
  btn.style.color = 'white';
  btn.style.cursor = 'pointer';
}

function submitCloze() {
  if (!clozeCurrentAnswer || clozeSubmitted) return;
  clozeSubmitted = true;

  const isCorrect = clozeCurrentAnswer === clozeCorrectAnswer;
  if (isCorrect) clozeCorrectCount++;

  // 交卷後才顯示目標單字
  const t = clozeCurrentTarget;
  document.getElementById('clozeWordHint').innerHTML =
    `<span>📌 本題目標單字：</span>
     <strong style="font-size:1rem;">${t.word}</strong>
     <span style="color:#a0aec0;">(${t.pos})</span>
     <span style="color:#4a5568;">${t.zh}</span>
     <button onclick="speak('${t.word.replace(/'/g,"\\'")}');" style="background:none;border:1.5px solid #3182ce;color:#3182ce;border-radius:6px;padding:2px 8px;font-size:0.78rem;cursor:pointer;">🔊</button>`;

  // 更新氣泡顏色
  ['A','B','C','D'].forEach(l => {
    const bubble = document.getElementById('bubble' + l);
    bubble.classList.remove('selected');
    if (l === clozeCorrectAnswer) bubble.classList.add('correct-bubble');
    else if (l === clozeCurrentAnswer) bubble.classList.add('wrong-bubble');
    bubble.style.cursor = 'default';
  });

  // 高亮選項列
  ['A','B','C','D'].forEach(l => {
    const row = document.getElementById('optRow' + l);
    if (l === clozeCorrectAnswer) row.classList.add('highlight-correct');
    else if (l === clozeCurrentAnswer && !isCorrect) row.classList.add('highlight-wrong');
  });

  // 結果標記
  const badge = document.getElementById('clozeResultBadge');
  badge.style.display = 'block';
  if (isCorrect) {
    badge.style.background = '#f0fff4';
    badge.style.color = '#276749';
    badge.textContent = '✓ 答對了！';
  } else {
    badge.style.background = '#fff5f5';
    badge.style.color = '#9b2c2c';
    badge.textContent = `✗ 答錯！正解是 ${clozeCorrectAnswer}`;
  }

  // 更新進度（答錯標為困難）
  const q = clozePendingQuestion;
  if (q) {
    setWordStatus(q.word, isCorrect ? 'known' : 'hard');
    updateGlobalStats();
  }

  document.getElementById('clozeSessionInfo').textContent =
    `本次：${clozeSessionCount} 題 ｜ 答對 ${clozeCorrectCount} 題`;

  // 展開解析
  showClozeExplanation(clozePendingExplanation);

  // 禁用交卷鍵
  const btn = document.getElementById('clozeSubmitBtn');
  btn.textContent = '已交卷';
  btn.disabled = true;
  btn.style.background = '#e2e8f0';
  btn.style.color = '#718096';
}

  const hardChips = hardWords.length
    ? hardWords.map(w => `<span style="background:#fff5f5;border:1px solid #fed7d7;color:#c53030;padding:3px 8px;border-radius:10px;font-size:0.78rem;margin:2px;display:inline-block;">${w}</span>`).join('')
    : '<span style="color:#a0aec0;font-size:0.85rem;">目前沒有困難單字 👍</span>';

  // 測驗紀錄
  const quizRows = recentScores.length
    ? recentScores.map(s => {
        const d = new Date(s.time).toLocaleString('zh-TW', {timeZone:'Asia/Taipei', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
        const p2 = Math.round(s.correct/s.total*100);
        const color = p2 >= 80 ? '#38a169' : p2 >= 60 ? '#d69e2e' : '#e53e3e';
        return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:0.85rem;">
          <span>${d}</span>
          <span style="color:${color};font-weight:700;">${s.correct}/${s.total}（${p2}%）</span>
        </div>`;
      }).join('')
    : '<p style="color:#a0aec0;font-size:0.85rem;">尚無測驗紀錄</p>';

  document.getElementById('parentReportDate').textContent = `報告時間：${todayStr}`;
  document.getElementById('parentModalContent').innerHTML = `
    <div style="background:#ebf8ff;border-radius:12px;padding:16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center;">
      <div><div style="font-size:1.8rem;font-weight:800;color:#3182ce;">${pct}%</div><div style="font-size:0.75rem;color:#718096;">整體完成度</div></div>
      <div><div style="font-size:1.8rem;font-weight:800;color:#48bb78;">${known}</div><div style="font-size:0.75rem;color:#718096;">已學單字</div></div>
      <div><div style="font-size:1.8rem;font-weight:800;color:#fc8181;">${hard}</div><div style="font-size:0.75rem;color:#718096;">困難單字</div></div>
      <div><div style="font-size:1.8rem;font-weight:800;color:#a0aec0;">${unseen}</div><div style="font-size:0.75rem;color:#718096;">尚未接觸</div></div>
    </div>

    <div style="background:#f0fff4;border-radius:12px;padding:16px;margin-bottom:16px;">
      <h3 style="font-size:0.95rem;margin-bottom:10px;">📅 今日學習（${todayStr}）</h3>
      <div style="display:flex;gap:16px;font-size:0.88rem;">
        <span>接觸單字：<strong>${todayWords}</strong> 個</span>
        <span>標為已學：<strong style="color:#38a169;">${todayKnown}</strong></span>
        <span>標為困難：<strong style="color:#e53e3e;">${todayHard}</strong></span>
      </div>
    </div>

    <div style="background:white;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:16px;">
      <h3 style="font-size:0.95rem;margin-bottom:12px;">📊 各級別進度</h3>
      ${levelRows}
    </div>

    <div style="background:white;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:16px;">
      <h3 style="font-size:0.95rem;margin-bottom:10px;">📝 近期測驗紀錄</h3>
      ${quizRows}
    </div>

    <div style="background:white;border:1px solid #e2e8f0;border-radius:12px;padding:16px;">
      <h3 style="font-size:0.95rem;margin-bottom:10px;">🔴 困難單字清單（${hardWords.length} 個）</h3>
      <div>${hardChips}</div>
    </div>
  `;

  document.getElementById('parentModal').style.display = 'block';
}

function closeParentModal() {
  document.getElementById('parentModal').style.display = 'none';
}

// 點 Modal 背景關閉
document.getElementById('parentModal').addEventListener('click', function(e) {
  if (e.target === this) closeParentModal();
});

// ===== 計時器 =====
let quizTimer = null;
let quizTimerStart = null;
const QUIZ_TIME_LIMIT = 12;

function startQuizTimer() {
  clearQuizTimer();
  quizTimerStart = Date.now();
  const bar = document.getElementById('timerBar');
  const wrap = document.getElementById('timerWrap');
  const lbl = document.getElementById('timerLabel');
  if (!bar) return;
  wrap.style.display = 'block';
  bar.style.transition = 'none';
  bar.style.width = '100%';
  setTimeout(() => {
    bar.style.transition = `width ${QUIZ_TIME_LIMIT}s linear`;
    bar.style.width = '0%';
  }, 30);
  let remain = QUIZ_TIME_LIMIT;
  if (lbl) lbl.textContent = `⏱ 剩餘 ${remain} 秒`;
  quizTimer = setInterval(() => {
    remain--;
    if (lbl) lbl.textContent = remain > 0 ? `⏱ 剩餘 ${remain} 秒` : '⏰ 時間到！';
    if (remain <= 0) {
      clearInterval(quizTimer);
      quizTimer = null;
      if (!quizAnswered) handleTimeout();
    }
  }, 1000);
}

function clearQuizTimer() {
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
  const wrap = document.getElementById('timerWrap');
  const lbl = document.getElementById('timerLabel');
  if (wrap) wrap.style.display = 'none';
  if (lbl) lbl.textContent = '';
}

function getResponseTime() {
  return quizTimerStart ? (Date.now() - quizTimerStart) / 1000 : 0;
}

function getMasteryTag(sec) {
  if (sec <= 3)  return '<span class="mastery-tag mastery-fast">快速 ⚡</span>';
  if (sec <= 7)  return '<span class="mastery-tag mastery-mid">普通 👍</span>';
  return '<span class="mastery-tag mastery-slow">需加強 📚</span>';
}

function handleTimeout() {
  if (quizAnswered) return;
  quizAnswered = true;
  quizWrong++;
  const q = quizQuestions[quizIndex];
  setWordStatus(q.word, 'hard');
  updateGlobalStats();

  if (quizMode === 'spelling') {
    const input = document.getElementById('spellingInput');
    if (input) {
      input.disabled = true;
      input.classList.add('wrong');
    }
    const fb = document.getElementById('spellingFeedback');
    if (fb) fb.innerHTML = `<span style="color:#e53e3e;font-weight:700;">⏰ 時間到！答案：</span> <strong>${q.word}</strong>`;
  } else {
    document.querySelectorAll('.option-btn').forEach(b => {
      b.disabled = true;
      const txt = b.textContent.trim().substring(3);
      if (txt === q.zh) b.classList.add('correct');
    });
  }
  document.getElementById('quizScore').innerHTML = `正確：<span class="correct">${quizCorrect}</span>　錯誤：<span class="wrong">${quizWrong}</span>`;
  const nb = document.getElementById('quizNextBtn');
  if (nb) nb.style.display = 'block';
}

// ===== 每日目標 =====
const DAILY_KEY = 'vocab_daily';
const DAILY_TARGET = 10;

function getTodayKey() {
  return new Date().toLocaleDateString('zh-TW', {timeZone:'Asia/Taipei'}).replace(/\//g,'-');
}

function getDailyData() {
  try { return JSON.parse(localStorage.getItem(DAILY_KEY)) || {}; } catch(e) { return {}; }
}

function markWordSeen(word) {
  const data = getDailyData();
  const today = getTodayKey();
  if (!data[today]) data[today] = {};
  if (!data[today][word]) data[today][word] = { seen: 1, correct: 0, wrong: 0, bestTime: null };
  else data[today][word].seen = (data[today][word].seen || 0) + 1;
  localStorage.setItem(DAILY_KEY, JSON.stringify(data));
  updateDailyBar();
}

function recordDailyResult(word, isCorrect, time) {
  const data = getDailyData();
  const today = getTodayKey();
  if (!data[today]) data[today] = {};
  if (!data[today][word]) data[today][word] = { seen: 1, correct: 0, wrong: 0, bestTime: null };
  const w = data[today][word];
  if (isCorrect) {
    w.correct = (w.correct || 0) + 1;
    if (time && (w.bestTime === null || time < w.bestTime)) w.bestTime = time;
  } else {
    w.wrong = (w.wrong || 0) + 1;
  }
  localStorage.setItem(DAILY_KEY, JSON.stringify(data));
  updateDailyBar();
}

function getTodayWords() {
  const data = getDailyData();
  const today = getTodayKey();
  return data[today] || {};
}

function getDailyPlan() {
  const p = loadProgress();
  const seenToday = new Set(Object.keys(getTodayWords()));
  const hardWords = VOCAB_ALL.filter(v => p[v.word] === 'hard');
  const newWords = VOCAB_ALL.filter(v => !p[v.word] && !seenToday.has(v.word));
  const plan = [...hardWords];
  const needed = Math.max(DAILY_TARGET - plan.length, 5);
  plan.push(...newWords.slice(0, needed));
  return plan.slice(0, Math.max(DAILY_TARGET + hardWords.length, DAILY_TARGET));
}

function updateDailyBar() {
  const todayWords = getTodayWords();
  const p = loadProgress();
  const learnedToday = Object.keys(todayWords).filter(w => p[w] === 'known').length;
  const pct = Math.min(100, Math.round(learnedToday / DAILY_TARGET * 100));
  const el = document.getElementById('dailyBarInner');
  const cnt = document.getElementById('dailyCount');
  if (el) el.style.width = pct + '%';
  if (cnt) cnt.textContent = `${learnedToday} / ${DAILY_TARGET}`;
}

function startDailyStudy() {
  const plan = getDailyPlan();
  if (plan.length === 0) {
    alert('今日目標已完成！繼續保持 💪');
    return;
  }
  currentDeck = plan;
  currentCardIndex = 0;
  isFlipped = false;
  currentFilter = 99; // 自定義篩選標記
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  switchPage('flashcard', document.querySelector('nav button'));
  renderCard();
  updateGlobalStats();
}

// ===== 拼字測驗 =====
let quizMode = 'choice';

function setQuizMode(mode, btn) {
  quizMode = mode;
  document.querySelectorAll('.quiz-mode-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  startQuiz();
}

function renderSpellingQuestion() {
  const q = quizQuestions[quizIndex];
  quizAnswered = false;
  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-type-tag">⌨️ 拼字測驗 — 看中文打英文</div>
      <div style="font-size:0.75rem;color:#a0aec0;margin-bottom:10px;">${q.pos} ｜ Level ${q.level}</div>
      <div class="quiz-question" style="font-size:1.8rem;color:#2b6cb0;">${q.zh}</div>
      <div style="font-size:0.82rem;color:#a0aec0;margin:12px 0 20px;">請拼出這個英文單字</div>
      <input id="spellingInput" class="spelling-input" type="text"
        placeholder="輸入英文單字…"
        onkeydown="if(event.key==='Enter')checkSpelling()"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div id="spellingFeedback" style="min-height:28px;margin-top:10px;font-size:0.9rem;text-align:center;"></div>
      <button onclick="checkSpelling()"
        style="width:100%;margin-top:10px;padding:12px;background:#3182ce;color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;">
        確認答案 (Enter)
      </button>
      <button onclick="revealHint()" id="hintBtn"
        style="width:100%;margin-top:8px;padding:8px;background:white;color:#718096;border:1.5px solid #e2e8f0;border-radius:10px;font-size:0.85rem;cursor:pointer;">
        💡 提示（首字母）
      </button>
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" style="display:none" onclick="nextQuizQuestion()">
      ${quizIndex + 1 < quizQuestions.length ? '下一題 →' : '查看結果'}
    </button>
  `;
  setTimeout(() => { const inp = document.getElementById('spellingInput'); if(inp) inp.focus(); }, 100);
  startQuizTimer();
}

function checkSpelling() {
  if (quizAnswered) return;
  const input = document.getElementById('spellingInput');
  const fb = document.getElementById('spellingFeedback');
  if (!input) return;
  const typed = input.value.trim().toLowerCase();
  if (!typed) return;
  const q = quizQuestions[quizIndex];
  const variants = q.word.toLowerCase().split('/').map(s => s.replace(/[()]/g,'').trim());
  const isCorrect = variants.includes(typed);
  const t = getResponseTime();
  clearQuizTimer();
  quizAnswered = true;
  input.disabled = true;

  if (isCorrect) {
    input.classList.add('correct');
    fb.innerHTML = `<span style="color:#38a169;font-weight:700;">✓ 正確！</span> ${getMasteryTag(t)} 用時 ${t.toFixed(1)} 秒`;
    quizCorrect++;
    setWordStatus(q.word, 'known');
    recordDailyResult(q.word, true, t);
  } else {
    input.classList.add('wrong');
    fb.innerHTML = `<span style="color:#e53e3e;font-weight:700;">✗ 正確拼法：</span><strong style="font-size:1.1rem;margin-left:6px;">${q.word}</strong>`;
    quizWrong++;
    setWordStatus(q.word, 'hard');
    recordDailyResult(q.word, false, t);
  }
  document.getElementById('quizScore').innerHTML = `正確：<span class="correct">${quizCorrect}</span>　錯誤：<span class="wrong">${quizWrong}</span>`;
  document.getElementById('quizNextBtn').style.display = 'block';
  updateGlobalStats();
}

function revealHint() {
  const q = quizQuestions[quizIndex];
  const btn = document.getElementById('hintBtn');
  if (btn) {
    btn.textContent = `💡 ${q.word[0]}${'_'.repeat(Math.max(0,q.word.length-1))}（共 ${q.word.length} 個字母）`;
    btn.disabled = true;
  }
}

// ===== 鍵盤快捷鍵 =====
document.addEventListener('keydown', e => {
  if (document.getElementById('page-flashcard').classList.contains('active')) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextCard(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
    if (e.key === 'ArrowUp' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
    if (e.key === 'k') markCard('known');
    if (e.key === 'h') markCard('hard');
  }
});

// ===== 初始化 =====
currentDeck = getFilteredDeck();
renderCard();
updateGlobalStats();
updateDailyBar();

</script>
